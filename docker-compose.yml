services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_rag_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_rag_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ai_rag_agent} -d ${POSTGRES_DB:-ai_rag_agent}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_rag_agent}:${POSTGRES_PASSWORD:-change_me_123}@db:5432/${POSTGRES_DB:-ai_rag_agent}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  backend_uploads:
